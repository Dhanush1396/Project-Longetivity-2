name: Daily Longevity Study Delivery

on:
  schedule:
    # 6:45 AM IST = 1:15 AM UTC
    - cron: "15 1 * * *"
  workflow_dispatch:
    # Also allows manual trigger from GitHub Actions UI

jobs:
  deliver:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: claude/epic-wright-a4elc9
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r execution/requirements.txt

      - name: Run daily agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: python execution/main_agent.py

      - name: Upload run log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-log
          path: "*.log"
          retention-days: 7
